{% extends "base.html" %}
{% block title %}Register — VoteHub{% endblock %}

{% block body %}
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="brand-icon">🗳️</div>
    <div class="brand-name">Vote<span>Hub</span></div>
  </a>
  <div class="navbar-links">
    <a href="/login" class="btn btn-primary">Login</a>
  </div>
</nav>

<div class="page-wrapper auth-container" style="padding:2rem 1rem;">
  <div class="auth-box" style="max-width:520px;">
    <div class="auth-header">
      <div class="auth-icon">🎓</div>
      <h1 class="auth-title">Student Registration</h1>
      <p class="auth-subtitle">Create your account to participate in the election</p>
    </div>

    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Roll Number</label>
          <input type="text" id="roll" class="form-input" placeholder="CS21001" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="Your name" />
        </div>
      </div>

      <div class="form-group mt-2">
        <label class="form-label">Department</label>
        <select id="dept" class="form-input">
          <option value="">Select Department</option>
          <option>Computer Science</option>
          <option>Information Technology</option>
          <option>Electronics & Communication</option>
          <option>Electrical Engineering</option>
          <option>Mechanical Engineering</option>
          <option>Civil Engineering</option>
          <option>MBA</option>
          <option>Commerce</option>
          <option>Science</option>
          <option>Arts</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">College Email</label>
        <input type="email" id="email" class="form-input" placeholder="rollno@college.edu" />
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 6 characters" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm" class="form-input" placeholder="Repeat password" />
        </div>
      </div>

      <button class="btn btn-primary w-full btn-lg mt-3" id="regBtn" onclick="handleRegister()">
        Create Account →
      </button>
    </div>

    <div class="auth-divider">or</div>
    <div style="text-align:center;">
      <span style="color:var(--muted);font-size:0.9rem;">Already registered? </span>
      <a href="/login" style="color:var(--accent);font-weight:600;text-decoration:none;">Login here</a>
    </div>
  </div>
</div>

<div id="toast"></div>
{% endblock %}

{% block scripts %}
<script>
async function handleRegister() {
  const fields = {
    roll_number: document.getElementById('roll').value.trim(),
    name: document.getElementById('name').value.trim(),
    department: document.getElementById('dept').value,
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    confirm_password: document.getElementById('confirm').value,
  };

  if (Object.values(fields).some(v => !v)) {
    showToast('Please fill in all fields', 'error');
    return;
  }

  const btn = document.getElementById('regBtn');
  setLoading(btn, true);

  const fd = new FormData();
  Object.entries(fields).forEach(([k, v]) => fd.append(k, v));

  try {
    const data = await formPost('/register', fd);
    if (data.success) {
      showToast(data.message, 'success');
      setTimeout(() => window.location.href = '/login', 1500);
    } else {
      showToast(data.message, 'error');
      setLoading(btn, false);
    }
  } catch {
    showToast('Registration failed. Try again.', 'error');
    setLoading(btn, false);
  }
}
</script>
{% endblock %}
